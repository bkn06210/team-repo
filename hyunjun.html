<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고현준 자기소개</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', sans-serif;
        background: #f0f4f8;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .card {
        background: white;
        border-radius: 16px;
        padding: 48px;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      .avatar {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: #4f80e1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin: 0 auto 24px;
      }

      h1 {
        font-size: 28px;
        color: #1a202c;
        margin-bottom: 8px;
      }

      .tag {
        display: inline-block;
        background: #ebf0ff;
        color: #4f80e1;
        font-size: 13px;
        padding: 4px 12px;
        border-radius: 20px;
        margin-bottom: 28px;
      }

      .section {
        text-align: left;
        margin-bottom: 20px;
      }

      .section h2 {
        font-size: 14px;
        color: #718096;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
      }

      .section p {
        font-size: 15px;
        color: #2d3748;
        line-height: 1.6;
      }

      .back {
        display: inline-block;
        margin-top: 32px;
        color: #4f80e1;
        text-decoration: none;
        font-size: 14px;
      }

      .back:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="avatar">👤</div>
      <h1>고현준</h1>
      <span class="tag">팀원</span>

      <div class="section">
        <h2>한 줄 소개</h2>
        <p>안녕하세요, 고현준입니다.</p>
      </div>

      <div class="section">
        <h2>관심사</h2>
        <p>개발, 협업, Git</p>
      </div>

      <div class="section">
        <h2>담당 업무</h2>
        <p>자기소개 페이지 제작</p>
      </div>

      <a class="back" href="index.html">← 메인으로 돌아가기</a>
    </div>
  </body>
</html>
